<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mangás Coloridos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

/* TOPO */

header{
    background:#ff2e63;
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:bold;
    position:sticky;
    top:0;
    z-index:10;
}

/* GRID */

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
    padding:15px;
}

/* CARD */

.card{
    background:#1d1d1d;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.info{
    padding:12px;
}

.info h2{
    font-size:18px;
    margin-bottom:8px;
}

.volume{
    color:#bbb;
    margin-bottom:12px;
}

/* BOTÃO */

.btn{
    width:100%;
    border:none;
    background:#ff2e63;
    color:white;
    padding:10px;
    border-radius:8px;
    font-weight:bold;
    font-size:15px;
}

/* LEITOR PDF */

#leitor{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    z-index:999;
}

.topo-leitor{
    background:#111;
    padding:10px;
    display:flex;
    justify-content:flex-end;
}

.fechar{
    background:red;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
}

iframe{
    width:100%;
    height:92vh;
    border:none;
    background:white;
}

</style>
</head>
<body>

<header>
Mangás Coloridos
</header>

<div class="container">

    <!-- CARD 1 -->

    <div class="card">

        <img src="https://i.postimg.cc/9Xx48Sp1/716EGgqzy-OL.jpg">

        <div class="info">

            <h2>Mangá One Peice Colorido</h2>

            <div class="volume">
                Capítulo 1
            </div>

            <button class="btn"
            onclick="abrirPDF('mangaonepiececolorido01.pdf')">

            Ler Online

            </button>

        </div>

    </div>

    <!-- CARD 2 -->

    <div class="card">

        <img src="capas/onepiece.jpg">

        <div class="info">

            <h2>One Piece</h2>

            <div class="volume">
                Volume 3
            </div>

            <button class="btn"
            onclick="abrirPDF('pdfs/onepiece-v3.pdf')">

            Ler Online

            </button>

        </div>

    </div>

</div>

<!-- LEITOR PDF -->

<div id="leitor">

    <div class="topo-leitor">

        <button class="fechar"
        onclick="fecharPDF()">

        Fechar

        </button>

    </div>

    <iframe id="pdfViewer"></iframe>

</div>

<script>

function abrirPDF(pdf){

    document.getElementById("leitor").style.display = "block";

    document.getElementById("pdfViewer").src = pdf;

}

function fecharPDF(){

    document.getElementById("leitor").style.display = "none";

    document.getElementById("pdfViewer").src = "";

}

</script>

</body>
</html>
